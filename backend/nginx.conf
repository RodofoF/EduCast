worker_processes auto;
rtmp_auto_push on;
events {}

rtmp {
    server {
        listen 1935;
        listen [::]:1935 ipv6only=on;

        application live {
            live on;
            record off;
            
            # Habilita HLS
            hls on;
            hls_path /tmp/hls/live;
            hls_fragment 3;
            hls_playlist_length 60;

            # Habilita DASH
            dash on;
            dash_path /tmp/dash/live;
            dash_fragment 3;
            dash_playlist_length 60;
            
            # Opcional: autenticação via HTTP callback
            # on_publish http://api:3000/api/streams/auth;
        }
        
        # Aplicação para gravação (opcional)
        application record {
            live on;
            record all;
            record_path /tmp/recordings;
            record_unique on;
            
            hls on;
            hls_path /tmp/hls/record;
            hls_fragment 3;
            hls_playlist_length 60;

            dash on;
            dash_path /tmp/dash/record;
            dash_fragment 3;
            dash_playlist_length 60;
        }
    }
}

http {
    sendfile off;
    tcp_nopush on;
    directio 512;
    default_type application/octet-stream;

    server {
        listen 80;

        # HLS endpoint
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # DASH endpoint
        location /dash {
            types {
                application/dash+xml mpd;
                video/iso.segment m4s;
                video/mp4 mp4;
            }
            default_type application/dash+xml;
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            add_header Content-Disposition inline;
        }

        # RTMP statistics
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }
        
        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}