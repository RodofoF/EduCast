services:
  db:
    image: mysql:8
    container_name: educast_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: educast
      MYSQL_DATABASE: educast
      MYSQL_USER: educast
      MYSQL_PASSWORD: educast
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "educast", "--password=educast"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  api:
    build: .
    container_name: educast_api
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: educast_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: educast
      PMA_PASSWORD: educast
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy